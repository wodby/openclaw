name: Build docker image

on:
  push:
    branches:
      - main

    tags:
      - '*'

env:
  OPENCLAW2026: '2026.3.7'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      openclaw-versions: ${{ steps.set-matrix.outputs.openclaw-versions }}
    steps:
      - id: set-matrix
        run: |
          cat << 'EOF' > versions.json
          [
            {"key": "openclaw2026", "version": "${{ env.OPENCLAW2026 }}", "latest": "1", "latest_major": "1"}
          ]
          EOF
          echo "openclaw-versions=$(cat versions.json | jq -c .)" >> $GITHUB_OUTPUT

  build:
    needs: setup
    strategy:
      matrix:
        openclaw: ${{ fromJson(needs.setup.outputs.openclaw-versions) }}
        arch:
          - amd64
          - arm64
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: build and push
        env:
          OPENCLAW_VER: ${{ matrix.openclaw.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          make
          make test
          make push

  push:
    runs-on: ubuntu-latest
    needs:
      - setup
      - build
    strategy:
      matrix:
        openclaw: ${{ fromJson(needs.setup.outputs.openclaw-versions) }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: ./.github/actions
        with:
          version: ${{ matrix.openclaw.version }}
          latest: ${{ matrix.openclaw.latest }}
          latest_major: ${{ matrix.openclaw.latest_major }}